<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Data Extractor</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.full.min.js"></script>
<style>
  body { font-family: monospace; font-size: 12px; padding: 20px; background: #111; color: #0f0; }
  #status { margin-bottom: 10px; color: #ff0; }
  #output { white-space: pre; overflow: auto; max-height: 90vh; }
</style>
</head>
<body>
<div id="status">Loading...</div>
<div id="output"></div>
<script>
const num = v => { if(v===null||v===undefined||v==='') return 0; const n=typeof v==='number'?v:parseFloat(String(v).replace(/[, ]/g,'')); return isNaN(n)?0:n; };
const str = v => v===null||v===undefined?'':String(v).trim();

async function go() {
  const status = document.getElementById('status');
  const out    = document.getElementById('output');

  status.textContent = 'Fetching workbook...';
  const resp = await fetch('uploads/new_workbook.xlsx');
  const buf  = await resp.arrayBuffer();
  status.textContent = 'Parsing...';

  const wb = XLSX.read(new Uint8Array(buf), { type:'array', cellFormula:true, raw:true });
  status.textContent = 'Sheets: ' + wb.SheetNames.join(', ');

  // Find Master Data sheet
  const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('master data'));
  if (!sheetName) { out.textContent = 'NO MASTER DATA SHEET\n' + wb.SheetNames.join('\n'); return; }

  const ws   = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:true });

  // Find header row
  let hdrIdx = -1;
  for (let r=0; r<Math.min(rows.length,5); r++) {
    if ((rows[r]||[]).includes('Transaction Type') && (rows[r]||[]).includes('D365 Legal Vendor name')) { hdrIdx=r; break; }
  }
  if (hdrIdx<0) { out.textContent='Header not found'; return; }

  const hdr = rows[hdrIdx];
  const colIdx = {};
  hdr.forEach((h,i) => { if(h) colIdx[str(h)] = i; });

  // Find SUBTOTAL row and get authoritative KPI values
  let subtotalRangeEnd = null;
  let wbSub = null;
  for (let r=hdrIdx+1; r<rows.length; r++) {
    const row = rows[r];
    if (!row || row.every(v=>v===null||v===''||v===undefined)) continue;
    const tx  = str(row[colIdx['Transaction Type']]);
    const cat = str(row[colIdx['Category']]);
    const sub = str(row[colIdx['Sub-Category1']]);
    if (!tx && !cat && !sub) {
      wbSub = {
        budget:   num(row[colIdx['2026 Final Budget']]),
        forecast: num(row[colIdx['2026 (Actuals + Forecast)']]),
        actual:   num(row[colIdx['Total Actuals']]),
        risk:     num(row[colIdx['2026 Risk']]),
        opp:      num(row[colIdx['2026 Opportunity']]),
        net:      num(row[colIdx['2026 Net Position']]),
      };
      // Try formula
      const budCell = ws[XLSX.utils.encode_cell({r, c: colIdx['2026 Final Budget']})];
      if (budCell && budCell.f) {
        const m = budCell.f.match(/:[A-Z]+(\d+)\s*[),]/);
        if (m) subtotalRangeEnd = parseInt(m[1],10);
      }
      break;
    }
  }

  // Fallback: sum-match
  if (!subtotalRangeEnd && wbSub) {
    let cum = 0;
    for (let r=hdrIdx+1; r<rows.length; r++) {
      const row=rows[r];
      if(!row||row.every(v=>v===null||v==='')) continue;
      const tx=str(row[colIdx['Transaction Type']]);
      const cat=str(row[colIdx['Category']]);
      const sub=str(row[colIdx['Sub-Category1']]);
      if(!tx&&!cat&&!sub) break;
      cum += num(row[colIdx['2026 Final Budget']]);
      if (Math.abs(cum - wbSub.budget) < 1) { subtotalRangeEnd = r+1; break; }
    }
  }

  // MONTHS
  const MONTHS_AC = ['Jan AC','Feb AC','Mar AC','Apr AC','May AC','Jun AC','Jul AC','Aug AC','Sep AC','Oct AC','Nov AC','Dec AC'];
  const MONTHS_FC = ['Jan FC','Feb FC','Mar FC','Apr FC','May FC','Jun FC','Jul FC','Aug FC','Sep FC','Oct FC','Nov FC','Dec FC'];
  const OR_NAMES  = ['Jan Opp/Risk','Feb Opp./Risk','Mar Opp./Risk','Apr Opp./Risk','May Opp./Risk','Jun Opp./Risk','Jul Opp./Risk','Aug Opp./Risk','Sep Opp./Risk','Oct Opp./Risk','Nov Opp./Risk','Dec Opp./Risk'];
  const OR_ALT    = ['Jan Opp./Risk','Feb Opp/Risk','Mar Opp/Risk','Apr Opp/Risk','May Opp/Risk','Jun Opp/Risk','Jul Opp/Risk','Aug Opp/Risk','Sep Opp/Risk','Oct Opp/Risk','Nov Opp/Risk','Dec Opp/Risk'];
  const resolvedOR = OR_NAMES.map((m,i) => {
    if (m in colIdx) return m;
    if (OR_ALT[i] in colIdx) return OR_ALT[i];
    const abbrev = m.slice(0,3);
    const found  = Object.keys(colIdx).find(k => k.startsWith(abbrev) && /Opp/.test(k));
    return found || m;
  });
  const readArr = (row, names) => names.map(n => { const ci=colIdx[n]; return ci!=null?num(row[ci]):0; });

  // Parse line items
  const lineItems = [];
  let rowCount = 0, exclCount = 0;
  for (let r=hdrIdx+1; r<rows.length; r++) {
    const excelRow = r+1;
    if (subtotalRangeEnd && excelRow > subtotalRangeEnd) { exclCount++; continue; }
    const row = rows[r];
    if (!row || row.every(v=>v===null||v===''||v===undefined)) continue;
    const tx  = str(row[colIdx['Transaction Type']]);
    const cat = str(row[colIdx['Category']]);
    const sub = str(row[colIdx['Sub-Category1']]);
    if (!tx && !cat && !sub) { exclCount++; continue; }
    if (tx.toLowerCase()==='capitalization') { exclCount++; continue; }
    const vendor = str(row[colIdx['D365 Legal Vendor name']]);
    const project= str(row[colIdx['Project Name']]);
    if (!vendor && !project) continue;
    lineItems.push({
      vendor, project,
      domain:   str(row[colIdx['Domain']]),
      owner:    str(row[colIdx['Domain Owner']]) || 'N/A',
      category: cat,
      subCat:   sub,
      app:      str(row[colIdx['Application']]),
      budget:   num(row[colIdx['2026 Final Budget']]),
      forecast: num(row[colIdx['2026 (Actuals + Forecast)']]),
      actual:   num(row[colIdx['Total Actuals']]),
      risk:     num(row[colIdx['2026 Risk']]),
      opp:      num(row[colIdx['2026 Opportunity']]),
      net:      num(row[colIdx['2026 Net Position']]),
      notes:    str(row[colIdx['Notes']]),
      monthlyAC: readArr(row, MONTHS_AC),
      monthlyFC: readArr(row, MONTHS_FC),
      monthlyOR: readArr(row, resolvedOR),
    });
    rowCount++;
  }

  // Aggregate summary from line items
  const agg = lineItems.reduce((s,x)=>({
    budget:s.budget+x.budget, forecast:s.forecast+x.forecast,
    actual:s.actual+x.actual, risk:s.risk+x.risk,
    opp:s.opp+x.opp, net:s.net+x.net
  }),{budget:0,forecast:0,actual:0,risk:0,opp:0,net:0});

  // Category breakdown (using subCategory for Labor/Software/etc, amortization special)
  function ovCat(li) {
    if ((li.category||'').toLowerCase()==='amortization') return 'Amortization';
    return li.subCat || '(Other)';
  }
  const catAgg = {};
  for (const li of lineItems) {
    const c = ovCat(li);
    if (!catAgg[c]) catAgg[c] = {budget:0, forecast:0, risk:0, opp:0, net:0, count:0};
    catAgg[c].budget   += li.budget;
    catAgg[c].forecast += li.forecast;
    catAgg[c].risk     += li.risk;
    catAgg[c].opp      += li.opp;
    catAgg[c].net      += li.net;
    catAgg[c].count++;
  }

  // Build risk/opp/net drill hierarchies
  function buildDrill(items, getAmt) {
    const byCat = {};
    for (const li of items) {
      const amt = getAmt(li);
      if (Math.abs(amt) < 0.005) continue;
      const cat    = ovCat(li);
      const vendor = li.vendor || '(unspecified)';
      const appPfx = li.app && li.app!=='N/A' && li.app.trim() ? li.app+' — ':'';
      const cName  = (appPfx+(li.project||'')).slice(0,80) || vendor;
      if (!byCat[cat]) byCat[cat] = {};
      if (!byCat[cat][vendor]) byCat[cat][vendor] = {total:0, contracts:[]};
      byCat[cat][vendor].total += amt;
      byCat[cat][vendor].contracts.push({name:cName, amount:amt, notes:li.notes||''});
    }
    const r2 = n => Math.round(n*100)/100;
    const categories = Object.entries(byCat).map(([cat, vm]) => {
      const vendors = Object.entries(vm).map(([name, data]) => {
        const vTotal = data.total;
        const mat = data.contracts.filter(c=>Math.abs(c.amount)>=100).map(c=>({...c, amount:r2(c.amount)}));
        const resid = vTotal - mat.reduce((s,c)=>s+c.amount,0);
        if (Math.abs(resid)>=0.01) mat.push({name:'Other / minor', amount:r2(resid), notes:''});
        return {name, amount:r2(vTotal), contracts:mat};
      }).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
      const catRaw = vendors.reduce((s,v)=>s+v.amount,0);
      return {cat, amount:r2(catRaw), vendors};
    }).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
    return {total:r2(categories.reduce((s,c)=>s+c.amount,0)), categories};
  }

  const riskDrill = buildDrill(lineItems, li=>li.risk||0);
  const oppDrill  = buildDrill(lineItems, li=>Math.abs(li.opp||0));
  const netDrill  = buildDrill(lineItems, li=>li.net||0);

  // Unique filter options
  const uniq = arr => [...new Set(arr.filter(x=>x&&x!==''))].sort();
  const filterOpts = {
    categories: uniq(lineItems.map(ovCat)),
    vendors:    uniq(lineItems.map(x=>x.vendor)),
    domains:    uniq(lineItems.map(x=>x.domain)),
    domainOwners: uniq(lineItems.map(x=>x.owner).filter(x=>x!=='N/A')),
  };

  // ── RECONCILIATION TABLES ────────────────────────────────────────────
  const recon = {
    workbookSubtotal: wbSub,
    subtotalRangeEnd,
    rowCount,
    exclCount,
    lineItemAgg: agg,
    diff: {
      budget:   Math.abs((wbSub?.budget||0)   - agg.budget),
      forecast: Math.abs((wbSub?.forecast||0) - agg.forecast),
      actual:   Math.abs((wbSub?.actual||0)   - agg.actual),
      risk:     Math.abs((wbSub?.risk||0)      - agg.risk),
      opp:      Math.abs((wbSub?.opp||0)       - agg.opp),
      net:      Math.abs((wbSub?.net||0)       - agg.net),
    },
    riskKPI:     wbSub?.risk,
    riskDrillTotal: riskDrill.total,
    oppKPI:      Math.abs(wbSub?.opp||0),
    oppDrillTotal: oppDrill.total,
    netKPI:      wbSub?.net,
    netDrillTotal: netDrill.total,
    catBreakdown: catAgg,
    filterOpts,
  };

  // Output reconciliation
  out.textContent = '=== RECONCILIATION ===\n' + JSON.stringify(recon, null, 2)
    + '\n\n=== RISK_DATA ===\n' + JSON.stringify(riskDrill)
    + '\n\n=== OPP_DATA ===\n'  + JSON.stringify(oppDrill)
    + '\n\n=== NET_DATA ===\n'  + JSON.stringify(netDrill)
    + '\n\n=== FILTER_OPTS ===\n' + JSON.stringify(filterOpts);

  status.textContent = `Done! ${rowCount} rows, subtotalRangeEnd=${subtotalRangeEnd}`;
}
go().catch(e => {
  document.getElementById('status').textContent = 'ERROR: ' + e.message;
  document.getElementById('output').textContent = e.stack;
});
</script>
</body>
</html>
